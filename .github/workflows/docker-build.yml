name: Build And Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Stop Old Container
        run: |
          docker rm -f movie-watchlist || true

      - name: Build Image
        run: |
          docker build -t movie-watchlist-app .

      - name: Run Container
        run: |
          docker run -d \
            --name movie-watchlist \
            -p ${{ secrets.APP_PORT }}:${{ secrets.APP_PORT }} \
            -e PORT=${{ secrets.APP_PORT }} \
            movie-watchlist-app